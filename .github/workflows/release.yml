# Build ALL slides images on every `v*` tag (or manual run) and push to GHCR:
#   slides-web    — the Next.js studio (:3100)
#   slides-slidev — the Slidev render sidecar (:3101)
#   slides-worker — the stateless slidev export/build worker (:3162) backing
#                   Export PDF / Publish site (internal-only behind /api/render)
# (Same multi-image pattern as whiteboard's app+relay.) The infra repo pins each
# @sha256 digest in k8s/argocd/children/appset-apps.yaml.
#
#   git tag v0.1.0 && git push --tags    (or: gh workflow run release.yml)

name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "git ref to build (tag or branch)"
        required: true
        default: "main"

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: web
            image: slides-web
          - target: slidev
            image: slides-slidev
          - target: worker
            image: slides-worker
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=tag
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Build & push (${{ matrix.target }})
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
          build-args: |
            NODE_AUTH_TOKEN=${{ secrets.GITHUB_TOKEN }}
            NEXT_PUBLIC_SOLID_ISSUER=https://pods.mindpods.org/
            NEXT_PUBLIC_POD_BASE_URL=https://pods.mindpods.org/
            NEXT_PUBLIC_SLIDEV_URL=https://slides-render.apps.mindpods.org

      - name: Emit digest-pinned image ref
        run: |
          IMAGE_LC="$(echo "${REGISTRY}/${{ github.repository_owner }}/${{ matrix.image }}" | tr '[:upper:]' '[:lower:]')"
          echo "Pinned image: ${IMAGE_LC}@${{ steps.push.outputs.digest }}"
          {
            echo "### ${{ matrix.image }}"
            echo '```'
            echo "${IMAGE_LC}@${{ steps.push.outputs.digest }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
