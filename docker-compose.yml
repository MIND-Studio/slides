services:
  css:
    image: solidproject/community-server:latest
    container_name: mind-slides-css
    ports:
      - "3102:3102"
    volumes:
      - ./.css-data:/data
      - ./infra/css/seed.json:/seed.json:ro
    command:
      - --port=3102
      - --baseUrl=http://localhost:3102/
      - --rootFilePath=/data
      - --config=@css:config/file.json
      - --seedConfig=/seed.json
      - --loggingLevel=warn
    restart: unless-stopped
